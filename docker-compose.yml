services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.local          # LOCAL_API_SECRET 从这里读取
    environment:
      - NODE_ENV=production
    volumes:
      - wc26_data:/app/data # 注单、设置等数据持久化
    networks:
      - internal
    # 如果不用 Nginx，改成 "3000:3000" 直接暴露
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro  # HTTPS 证书目录（可选）
    depends_on:
      - app
    networks:
      - internal

volumes:
  wc26_data:
    driver: local

networks:
  internal:
